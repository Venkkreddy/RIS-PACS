version: "3.9"

services:
  dicoogle:
    build:
      context: ./packages/dicoogle-server
    container_name: dicoogle
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "11112:104"
    environment:
      REPORTING_WEBHOOK_URL: http://reporting-app-backend:8080/webhook/study
    volumes:
      - ./storage:/var/dicoogle/storage
      - ./dicoogle-index:/var/dicoogle/index
    networks:
      - imaging-net

  ohif:
    build:
      context: ./packages/ohif-viewer
    container_name: ohif-viewer
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - dicoogle
    networks:
      - imaging-net

  monai-server:
    build:
      context: ./packages/monai-server
    container_name: monai-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./monai-models:/opt/monai/models
    environment:
      MONAI_SERVER_PORT: 5000
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-}"
      GCP_LOCATION: "${GCP_LOCATION:-us-central1}"
      MEDGEMMA_MODEL: "${MEDGEMMA_MODEL:-medgemma-4b}"
      MEDGEMMA_ENDPOINT: "${MEDGEMMA_ENDPOINT:-}"
      VERTEX_AI_ENABLED: "${VERTEX_AI_ENABLED:-false}"
      GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-gemini}"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-}"
      CORS_ORIGINS: "http://reporting-app-backend:8080,http://localhost:8081"
    networks:
      - imaging-net

  medasr-server:
    build:
      context: ./packages/medasr-server
    container_name: medasr-server
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MEDASR_PORT: 5001
      MEDASR_MODEL: "${MEDASR_MODEL:-google/medasr}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      CORS_ORIGINS: "http://reporting-app-backend:8080,http://localhost:8081"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-}"
      GCP_LOCATION: "${GCP_LOCATION:-us-central1}"
      MEDGEMMA_MODEL: "${MEDGEMMA_MODEL:-medgemma-4b}"
      MEDGEMMA_ENDPOINT: "${MEDGEMMA_ENDPOINT:-}"
      VERTEX_AI_ENABLED: "${VERTEX_AI_ENABLED:-false}"
      GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS:-}"
    networks:
      - imaging-net

  reporting-app-backend:
    image: node:20-alpine
    container_name: reporting-app-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -w backend"
    volumes:
      - ./packages/reporting-app:/app
      - /app/node_modules
      - /app/backend/node_modules
      - /app/frontend/node_modules
      - /app/shared/node_modules
      # Same host folder as dicoogle:/var/dicoogle/storage — required so uploads
      # land where Dicoogle indexes (see DICOOGLE_INDEX_URI).
      - ./storage:/storage
    environment:
      PORT: 8080
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5173}"
      OHIF_BASE_URL: http://ohif-viewer
      OHIF_PUBLIC_BASE_URL: "${OHIF_URL:-http://localhost:3000}"
      DICOOGLE_BASE_URL: http://dicoogle:8080
      DICOOGLE_STORAGE_DIR: /storage
      DICOOGLE_INDEX_URI: file:///var/dicoogle/storage
      MONAI_SERVER_URL: http://monai-server:5000
      MONAI_ENABLED: "true"
      MEDASR_SERVER_URL: http://medasr-server:5001
      MEDASR_ENABLED: "true"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-real-secret}"
      DATABASE_URL: "postgresql://tdai:${POSTGRES_PASSWORD:-tdai_dev_password}@postgres:5432/tdai_multitenant"
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-real-jwt-secret-at-least-32-chars}"
      MULTI_TENANT_ENABLED: "${MULTI_TENANT_ENABLED:-true}"
      PLATFORM_ADMIN_KEY: "${PLATFORM_ADMIN_KEY:-tdai-platform-admin-key-dev}"
      TENANT_STORAGE_ROOT: "/storage"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}"
      MASTER_ADMIN_EMAILS: "${MASTER_ADMIN_EMAILS:-}"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      monai-server:
        condition: service_started
      medasr-server:
        condition: service_started
    networks:
      - imaging-net

  reporting-app-frontend:
    image: node:20-alpine
    container_name: reporting-app-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -w frontend -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./packages/reporting-app:/app
      - /app/node_modules
      - /app/backend/node_modules
      - /app/frontend/node_modules
      - /app/shared/node_modules
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8081}"
      VITE_BACKEND_PROXY_TARGET: http://reporting-app-backend:8080
      VITE_FIREBASE_API_KEY: "${VITE_FIREBASE_API_KEY:-}"
      VITE_FIREBASE_AUTH_DOMAIN: "${VITE_FIREBASE_AUTH_DOMAIN:-}"
      VITE_FIREBASE_PROJECT_ID: "${VITE_FIREBASE_PROJECT_ID:-}"
      VITE_FIREBASE_APP_ID: "${VITE_FIREBASE_APP_ID:-}"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - reporting-app-backend
    networks:
      - imaging-net

  # ── Multi-tenant infrastructure ──

  postgres:
    image: postgres:16-alpine
    container_name: tdai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tdai_multitenant
      POSTGRES_USER: tdai
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-tdai_dev_password}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/reporting-app/backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdai -d tdai_multitenant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imaging-net

networks:
  imaging-net:
    driver: bridge

volumes:
  pgdata:
