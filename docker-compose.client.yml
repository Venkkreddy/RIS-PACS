###############################################################################
# TDAI RIS/PACS - Client Distribution
#
# Start:    docker compose up -d
# Stop:     docker compose down
# Logs:     docker compose logs -f
# Status:   docker compose ps
#
# All images are pre-built. No source code or build tools required.
# No .env file needed - all defaults are hardcoded.
###############################################################################

services:
  # -- Infrastructure --------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: tdai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tdai_multitenant
      POSTGRES_USER: tdai
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-tdai_dev_password}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdai -d tdai_multitenant"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - imaging-net

  # -- PACS / Imaging --------------------------------------------------------

  orthanc:
    image: tdai-orthanc-custom:latest
    container_name: orthanc
    restart: unless-stopped
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
      - "11115:11115"
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./worklist.py:/etc/orthanc/worklist.py:ro
    environment:
      VERBOSE_ENABLED: "false"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      PYTHON_PLUGIN_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8042/system"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - imaging-net

  dicoogle:
    image: tdai-dicoogle:latest
    container_name: dicoogle
    restart: unless-stopped
    ports:
      - "${DICOOGLE_HTTP_PORT:-8080}:8080"
      - "${DICOOGLE_DICOM_PORT:-11112}:104"
    environment:
      REPORTING_WEBHOOK_URL: "http://reporting-app-backend:8080/webhook/study"
    volumes:
      - dicoogle-storage:/var/dicoogle/storage
      - dicoogle-index:/var/dicoogle/index
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    networks:
      - imaging-net

  # -- AI / ML Services ------------------------------------------------------

  monai-server:
    image: tdai-monai-server:latest
    container_name: monai-server
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MONAI_PORT:-5000}:5000"
    volumes:
      - monai-models:/opt/monai/models
    environment:
      MONAI_MODELS_DIR: /opt/monai/models
      MONAI_SERVER_PORT: "5000"
      ORTHANC_URL: "http://orthanc:8042"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-ris-pacs-client}"
      GCP_LOCATION: "${GCP_LOCATION:-us-central1}"
      MEDGEMMA_MODEL: "${MEDGEMMA_MODEL:-medgemma-4b}"
      MEDGEMMA_ENDPOINT: "${MEDGEMMA_ENDPOINT:-}"
      VERTEX_AI_ENABLED: "${VERTEX_AI_ENABLED:-false}"
      GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-gemini}"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-}"
      CORS_ORIGINS: "http://localhost:3000,https://localhost:5173,http://localhost:8081"
    depends_on:
      orthanc:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 10
    networks:
      - imaging-net

  medasr-server:
    image: tdai-medasr-server:latest
    container_name: medasr-server
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MEDASR_PORT:-5001}:5001"
    environment:
      MEDASR_PORT: "5001"
      MEDASR_MODEL: "${MEDASR_MODEL:-google/medasr}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      CORS_ORIGINS: "https://localhost:5173"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-ris-pacs-client}"
      GCP_LOCATION: "${GCP_LOCATION:-us-central1}"
      MEDGEMMA_MODEL: "${MEDGEMMA_MODEL:-medgemma-4b}"
      MEDGEMMA_ENDPOINT: "${MEDGEMMA_ENDPOINT:-}"
      VERTEX_AI_ENABLED: "${VERTEX_AI_ENABLED:-false}"
      GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS:-}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    networks:
      - imaging-net

  # -- Reporting Application -------------------------------------------------

  reporting-app-backend:
    image: tdai-reporting-app-backend:latest
    container_name: reporting-app-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    environment:
      PORT: "8080"
      NODE_ENV: "production"
      APP_ENV_MODE: "docker"
      USE_INMEMORY_STORE: "false"
      HIPAA_REQUIRE_HTTPS: "false"
      ENABLE_DEV_LOGIN: "true"
      ENABLE_AUTH: "true"
      FRONTEND_URL: "https://localhost:5173"
      BACKEND_URL: "http://reporting-app-backend:8080"
      OHIF_BASE_URL: "http://ohif-viewer"
      OHIF_PUBLIC_BASE_URL: "https://localhost:3000"
      DICOOGLE_BASE_URL: "http://dicoogle:8080"
      DICOOGLE_STORAGE_DIR: "/storage"
      DICOOGLE_INDEX_URI: "file:///var/dicoogle/storage"
      MONAI_SERVER_URL: "http://monai-server:5000"
      MONAI_ENABLED: "true"
      MEDASR_SERVER_URL: "http://medasr-server:5001"
      MEDASR_ENABLED: "true"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      SESSION_SECRET: "${SESSION_SECRET:-tdai-session-secret-change-in-production}"
      DATABASE_URL: "postgresql://tdai:${POSTGRES_PASSWORD:-tdai_dev_password}@postgres:5432/tdai_multitenant"
      JWT_SECRET: "${JWT_SECRET:-tdai-jwt-secret-change-in-production-00000}"
      MULTI_TENANT_ENABLED: "true"
      PLATFORM_ADMIN_KEY: "${PLATFORM_ADMIN_KEY:-tdai-platform-admin-key-dev}"
      TENANT_STORAGE_ROOT: "/storage"
      WEASIS_BASE_URL: "https://localhost:5173/dicom-web"
      CORS_ALLOW_ALL: "true"
      CORS_ALLOWED_ORIGINS: "https://localhost:5173,http://localhost:3000,https://localhost:3000,http://localhost:8042"
      MASTER_ADMIN_EMAILS: "${MASTER_ADMIN_EMAILS:-}"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-ris-pacs-client}"
      FIREBASE_PROJECT_ID: "${VITE_FIREBASE_PROJECT_ID:-ris-pacs-client}"
      GOOGLE_APPLICATION_CREDENTIALS: /app/service-account.json
      GCS_BUCKET: "${GCS_BUCKET:-ris-pacs-client.firebasestorage.app}"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY:-}"
      SENDGRID_FROM_EMAIL: "${SENDGRID_FROM_EMAIL:-reports@example.com}"
    volumes:
      - dicoogle-storage:/storage
      - ./service-account.json:/app/service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      dicoogle:
        condition: service_healthy
      orthanc:
        condition: service_started
      monai-server:
        condition: service_healthy
      medasr-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - imaging-net

  reporting-app-frontend:
    image: tdai-reporting-app-frontend:latest
    container_name: reporting-app-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:443"
    depends_on:
      reporting-app-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:443/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - imaging-net

  ohif:
    image: tdai-ohif:latest
    container_name: ohif-viewer
    restart: unless-stopped
    ports:
      - "${OHIF_PORT:-3000}:443"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      orthanc:
        condition: service_started
      reporting-app-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://localhost:443/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - imaging-net

networks:
  imaging-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  orthanc-storage:
    driver: local
  dicoogle-storage:
    driver: local
  dicoogle-index:
    driver: local
  monai-models:
    driver: local
