name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install OHIF dependencies
        run: yarn install --frozen-lockfile
        working-directory: packages/ohif-viewer

      - name: Build monorepo
        run: npx turbo run build

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy reporting backend (Cloud Run)
        run: |
          gcloud run deploy reporting-api \
            --source ./packages/reporting-app/backend \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated

      - name: Deploy OHIF viewer (Cloud Run)
        run: |
          gcloud run deploy ohif-viewer \
            --source ./packages/ohif-viewer \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated

      - name: Deploy Dicoogle wrapper service (Cloud Run)
        run: |
          gcloud run deploy dicoogle-server \
            --source ./packages/dicoogle-server \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated
