server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip            on;
    gzip_types      application/javascript application/json text/css text/plain application/dicom+json;
    gzip_min_length 256;

    # ── OHIF single-page application ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Reverse-proxy: DICOMWeb QIDO-RS / WADO-RS / STOW-RS ──
    location /dicom-web/ {
        proxy_pass         http://orthanc:8042/dicom-web/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        proxy_buffering    off;
        proxy_request_buffering off;
        client_max_body_size 0;

        # CORS headers for browser-based DICOMWeb access
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Authorization, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Reverse-proxy: WADO-URI (legacy single-frame retrieval) ──
    location /wado {
        proxy_pass         http://orthanc:8042/wado;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        client_max_body_size 0;

        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Reverse-proxy: MONAI AI server ──
    location /monai/ {
        proxy_pass         http://monai-server:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
        client_max_body_size 500m;
        proxy_read_timeout 180s;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Reverse-proxy: Orthanc REST API (upload, patients, studies) ──
    location /orthanc/ {
        proxy_pass         http://orthanc:8042/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
        client_max_body_size 0;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
