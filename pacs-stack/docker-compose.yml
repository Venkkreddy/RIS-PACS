services:
  # ── Primary PACS: Orthanc with DICOMWeb ──
  orthanc:
    image: orthancteam/orthanc:latest
    container_name: orthanc
    ports:
      - "4242:4242"
      - "8042:8042"
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    environment:
      VERBOSE_ENABLED: "false"
      DICOM_WEB_PLUGIN_ENABLED: "true"
    restart: unless-stopped
    networks:
      - pacs-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8042/system')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Web Viewer: OHIF v3 with nginx reverse-proxy to Orthanc ──
  ohif:
    image: ohif/app:latest
    container_name: ohif-viewer
    ports:
      - "3000:80"
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./ohif/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      orthanc:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pacs-net

  # ── Optional: Dicoogle for indexing/search only ──
  # Activate with: docker-compose --profile dicoogle up
  dicoogle:
    build:
      context: ../packages/dicoogle-server
    container_name: dicoogle
    profiles: ["dicoogle"]
    ports:
      - "8080:8080"
      - "6666:104"
    volumes:
      - dicoogle-storage:/var/dicoogle/storage
      - dicoogle-index:/var/dicoogle/index
    depends_on:
      orthanc:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pacs-net

networks:
  pacs-net:
    driver: bridge

volumes:
  orthanc-storage:
  dicoogle-storage:
  dicoogle-index:
