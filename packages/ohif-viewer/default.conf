server {
  listen 80 default_server;
  listen [::]:80 default_server;
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;

  ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
  ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
  ssl_protocols       TLSv1.2 TLSv1.3;

  # Docker's embedded DNS — use a variable for proxy_pass so nginx
  # starts even when reporting-app-backend is temporarily unavailable.
  resolver 127.0.0.11 valid=5s ipv6=off;
  set $ris_backend "http://reporting-app-backend:8080";

  root /usr/share/nginx/html;
  index index.html index.htm;

  # On-the-fly gzip for all responses (safe for all clients).
  gzip            on;
  gzip_types      application/javascript application/json text/css text/plain
                  application/wasm application/dicom+json image/svg+xml
                  font/woff2 application/font-woff;
  gzip_min_length 256;
  gzip_vary       on;
  gzip_proxied    any;

  # Serve pre-compressed .gz files only to clients that accept gzip.
  # Using "on" (not "always") avoids sending raw gzip bytes to clients
  # that lack Accept-Encoding: gzip — the main cause of ChunkLoadError.
  gzip_static on;

  # Backward compatibility for legacy OHIF deep links:
  location ~ ^/viewer/(?<legacy_uid_prefix>[0-9]+(?:\.[0-9]+)*\.?)/(?<legacy_uid_tail1>[0-9]+)(?:/(?<legacy_uid_tail2>[0-9]+))?/?$ {
    return 302 $scheme://$http_host/viewer?StudyInstanceUIDs=$legacy_uid_prefix$legacy_uid_tail1$legacy_uid_tail2;
  }

  location ~ ^/viewer/(?<legacy_datasource>[^/]+)/(?<legacy_uid_prefix>[0-9]+(?:\.[0-9]+)*\.?)/(?<legacy_uid_tail1>[0-9]+)(?:/(?<legacy_uid_tail2>[0-9]+))?/?$ {
    return 302 $scheme://$http_host/viewer/$legacy_datasource?StudyInstanceUIDs=$legacy_uid_prefix$legacy_uid_tail1$legacy_uid_tail2&datasources=$legacy_datasource;
  }

  location ~ ^/viewer/(?<legacy_uid>[0-9]+(?:\.[0-9]+)+)/?$ {
    return 302 $scheme://$http_host/viewer?StudyInstanceUIDs=$legacy_uid;
  }

  location ~ ^/viewer/(?<legacy_datasource>[^/]+)/(?<legacy_uid>[0-9]+(?:\.[0-9]+)+)/?$ {
    return 302 $scheme://$http_host/viewer/$legacy_datasource?StudyInstanceUIDs=$legacy_uid&datasources=$legacy_datasource;
  }

  # Static assets: return 404 (not index.html) for missing JS/CSS/images.
  location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";
  }

  # Replace the legacy Workbox SW with a clean-up worker that purges stale
  # caches (which held 0-byte JS stubs) and then becomes a no-op.
  location = /sw.js {
    default_type application/javascript;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    return 200 'self.addEventListener("install",function(){self.skipWaiting()});self.addEventListener("activate",function(e){e.waitUntil(caches.keys().then(function(n){return Promise.all(n.map(function(k){return caches.delete(k)}))}).then(function(){return self.clients.claim()}))});';
  }

  # SPA fallback serves index.html for all navigation requests.
  # gzip_static must be OFF here so sub_filter can process the HTML.
  # sub_filter rewrites script/link URLs to bust stale browser cache entries
  # that may hold 0-byte responses from the old image.
  location / {
    gzip_static off;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";

    sub_filter '/app.bundle.06baf109f6221cfa0e3e.js"' '/app.bundle.06baf109f6221cfa0e3e.js?v=2"';
    sub_filter '/app.bundle.css"' '/app.bundle.css?v=2"';
    sub_filter '/init-service-worker.js"' '/init-service-worker.js?v=2"';
    sub_filter '</head>' '<script>if(navigator.serviceWorker){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(w){w.unregister()})})}</script></head>';
    sub_filter_once on;
    sub_filter_types text/html;
  }

  # ── Reverse-proxy: reporting backend DICOMWeb (same-origin for OHIF) ──
  location /dicom-web/ {
    proxy_pass         $ris_backend/dicom-web/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Accept-Encoding   "";
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;

    proxy_intercept_errors on;
    error_page 502 504 = @fallback_dicom_web;
  }

  location @fallback_dicom_web {
    proxy_pass         http://host.docker.internal:8081;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Accept-Encoding   "";
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;
  }

  # ── Reverse-proxy: reporting backend WADO-URI (same-origin for OHIF) ──
  location /wado {
    proxy_pass         $ris_backend/wado;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;

    proxy_intercept_errors on;
    error_page 502 504 = @fallback_wado;
  }

  location @fallback_wado {
    proxy_pass         http://host.docker.internal:8081;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;
  }

  # Optional tokenized path compatibility used by some OHIF flows.
  location /weasis/ {
    proxy_pass         $ris_backend/dicom-web/weasis/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Accept-Encoding   "";
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;

    proxy_intercept_errors on;
    error_page 502 504 = @fallback_weasis;
  }

  location @fallback_weasis {
    rewrite            ^/weasis/(.*)$ /dicom-web/weasis/$1 break;
    proxy_pass         http://host.docker.internal:8081;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Accept-Encoding   "";
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;
  }

  # Forward Orthanc validation to backend DICOMweb validator
  location ~ ^/orthanc/dicom-web/studies/([^/]+)/validate$ {
    proxy_pass         $ris_backend/dicom-web/studies/$1/validate;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_intercept_errors on;
    error_page 502 504 = @fallback_validate;
  }

  location @fallback_validate {
    rewrite            ^/orthanc/dicom-web/studies/([^/]+)/validate$ /dicom-web/studies/$1/validate break;
    proxy_pass         http://host.docker.internal:8081;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Reverse-proxy: Orthanc DICOMWeb (QIDO-RS / WADO-RS / STOW-RS) ──
  location /orthanc/dicom-web/ {
    proxy_pass         http://orthanc:8042/dicom-web/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Accept-Encoding   "";
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;

    sub_filter 'http://localhost/dicom-web/' '/orthanc/dicom-web/';
    sub_filter 'https://localhost/dicom-web/' '/orthanc/dicom-web/';
    sub_filter 'http://localhost:3000/dicom-web/' '/orthanc/dicom-web/';
    sub_filter 'https://localhost:3000/dicom-web/' '/orthanc/dicom-web/';
    sub_filter 'http://orthanc:8042/dicom-web/' '/orthanc/dicom-web/';
    sub_filter 'https://orthanc:8042/dicom-web/' '/orthanc/dicom-web/';
    sub_filter 'http://host.docker.internal:8081/dicom-web/' '/orthanc/dicom-web/';
    sub_filter_types *;
    sub_filter_once off;

    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
    add_header Access-Control-Allow-Headers "DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Authorization, Accept" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Content-Type" always;

    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  # ── Reverse-proxy: Orthanc WADO-URI ──
  location /orthanc/wado {
    proxy_pass         http://orthanc:8042/wado;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    client_max_body_size 0;

    add_header Access-Control-Allow-Origin "*" always;
  }

  # ── Reverse-proxy: Orthanc REST API (upload, patients, studies) ──
  location /orthanc/ {
    proxy_pass         http://orthanc:8042/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_request_buffering off;
    client_max_body_size 0;

    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  # (SPA fallback location / is defined above with sub_filter directives)

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
