<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TDAI Rad | AI-Powered Teleradiology Platform</title>
    <meta
      name="description"
      content="TDAI Rad delivers AI-powered connected teleradiology with multicenter worklists, OHIF viewing, and rapid reporting."
    />
    <meta property="og:title" content="TDAI Rad | AI-Powered Teleradiology Platform" />
    <meta
      property="og:description"
      content="Revolutionizing teleradiology with AI-powered connected care from Trivitron Digital & AI Solutions."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#1A2B56" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      #root-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #F9FAFB;
        font-family: Inter, system-ui, sans-serif;
      }
      #root-loader .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid #E2E8F0;
        border-top-color: #00B4A6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loader"><div class="spinner"></div></div>
    </div>
    <script>
      // #region agent log
      window.__tdaiAgentDebugLog = function (hypothesisId, location, message, data, runId) {
        fetch("http://127.0.0.1:7829/ingest/0823df88-6411-4f3d-9920-ebf0779efd31", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Debug-Session-Id": "b161f5",
          },
          body: JSON.stringify({
            sessionId: "b161f5",
            runId: runId || "run-2",
            hypothesisId: hypothesisId,
            location: location,
            message: message,
            data: data || {},
            timestamp: Date.now(),
          }),
        }).catch(function () {});
      };
      window.__tdaiAgentDebugLog("H10", "index.html:inline", "index inline debug script executed", {
        path: window.location.pathname,
      }, "run-2");
      window.addEventListener("error", function (event) {
        var scriptTarget = event.target && event.target.tagName === "SCRIPT";
        window.__tdaiAgentDebugLog("H10", "index.html:error", "window error captured", {
          scriptError: !!scriptTarget,
          scriptSrc: scriptTarget ? (event.target.getAttribute("src") || "") : "",
          message: event.message || "",
          filename: event.filename || "",
          lineno: event.lineno || 0,
        }, "run-2");
      }, true);
      window.addEventListener("unhandledrejection", function (event) {
        var reason = event.reason;
        var reasonMessage = typeof reason === "string" ? reason : (reason && reason.message) || "unknown";
        window.__tdaiAgentDebugLog("H11", "index.html:unhandledrejection", "unhandled promise rejection before app mount", {
          reason: reasonMessage,
          path: window.location.pathname,
        }, "run-2");
      });
      // #endregion
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
